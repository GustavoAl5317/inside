# Inside Sales — HTTPS na porta 443 (Apache)
#
# NÃO substitui o site atual. Adicione estas linhas DENTRO do
# <VirtualHost *:443> que já existe em /etc/apache2/sites-enabled/
#
# Antes:
#   sudo a2enmod proxy proxy_http ssl headers
#   sudo apache2ctl configtest
#   sudo systemctl reload apache2

    # ── Inside Sales (Next.js na porta 3000) ─────────────────────────────
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Prefix "/inside"

    ProxyPass        /inside/ http://127.0.0.1:3000/inside/
    ProxyPassReverse /inside/ http://127.0.0.1:3000/inside/
