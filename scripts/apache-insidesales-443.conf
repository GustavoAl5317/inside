# Inside Sales — site completo na HTTPS 443 (substitui o vhost anterior)
#
# Na VM:
#   sudo a2enmod proxy proxy_http ssl headers
#   sudo cp scripts/apache-insidesales-443.conf /etc/apache2/sites-available/insidesales-443.conf
#   sudo a2dissite OUTRO-SITE.conf    # desativa o site antigo na 443
#   sudo a2ensite insidesales-443
#   sudo apache2ctl configtest
#   sudo systemctl reload apache2

<VirtualHost *:443>
    ServerName intc02.int.intcloud.com.br

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/intc02.int.intcloud.com.br/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/intc02.int.intcloud.com.br/privkey.pem

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"

    ProxyPass        / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    ErrorLog ${APACHE_LOG_DIR}/insidesales-error.log
    CustomLog ${APACHE_LOG_DIR}/insidesales-access.log combined
</VirtualHost>
